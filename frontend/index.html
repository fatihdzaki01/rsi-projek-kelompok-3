<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berbagive</title>
    <link rel="dns-prefetch" href="//localhost">
  </head>
  <body>
    <div id="app">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#F5F0E8">
        <div style="text-align:center">
          <div style="display:inline-block;width:32px;height:32px;border:3px solid #D2C4B0;border-top-color:#8B4513;border-radius:50%;animation:spin 0.8s linear infinite"></div>

  </body>
