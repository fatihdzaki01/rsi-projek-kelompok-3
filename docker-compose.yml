x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build: .
    container_name: berbagive-app
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./backend/storage:/var/www/storage
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-berbagive}"
      DB_USERNAME: "${DB_USERNAME:-berbagive}"
      DB_PASSWORD: "${DB_PASSWORD:-berbagive123}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-berbagive}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-berbagive123}"
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: berbagive
      AWS_ENDPOINT: "http://minio:9000"
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      AWS_URL: ""
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      MAIL_MAILER: "${MAIL_MAILER:-smtp}"
      MAIL_HOST: "${MAIL_HOST:-sandbox.smtp.mailtrap.io}"
      MAIL_PORT: "${MAIL_PORT:-2525}"
      MAIL_USERNAME: "${MAIL_USERNAME}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-noreply@berbagive.com}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-Berbagive}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - berbagive-net

  nginx:
    image: nginx:1.24-alpine
    container_name: berbagive-nginx
    restart: unless-stopped
    logging: *logging
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/public:ro
      - ./backend/storage/app/public:/var/www/storage/app/public:ro
      - ./frontend/dist:/var/www/frontend-dist:ro
    depends_on:
      - app
    networks:
      - berbagive-net

  db:
    image: postgres:16-alpine
    container_name: berbagive-db
    restart: unless-stopped
    logging: *logging
    environment:
      POSTGRES_DB: "${DB_DATABASE:-berbagive}"
      POSTGRES_USER: "${DB_USERNAME:-berbagive}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-berbagive123}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-berbagive} -d ${DB_DATABASE:-berbagive}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - berbagive-net

  redis:
    image: redis:7-alpine
    container_name: berbagive-redis
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - berbagive-net

  minio:
    image: minio/minio:latest
    container_name: berbagive-minio
    restart: unless-stopped
    logging: *logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-berbagive}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-berbagive123}"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - berbagive-net

  queue:
    build: .
    container_name: berbagive-queue
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 256M
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=60
    healthcheck:
      test: ["CMD", "php", "-r", "echo 1;"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-berbagive}"
      DB_USERNAME: "${DB_USERNAME:-berbagive}"
      DB_PASSWORD: "${DB_PASSWORD:-berbagive123}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - berbagive-net

  scheduler:
    build: .
    container_name: berbagive-scheduler
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 256M
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:run' > /dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-berbagive}"
      DB_USERNAME: "${DB_USERNAME:-berbagive}"
      DB_PASSWORD: "${DB_PASSWORD:-berbagive123}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-berbagive}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-berbagive123}"
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: berbagive
      AWS_ENDPOINT: "http://minio:9000"
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - berbagive-net

volumes:
  pgdata:
  minio-data:

networks:
  berbagive-net:
    driver: bridge
